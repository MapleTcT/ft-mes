name: Verify

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  repo-verify:
    name: Maven and Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version
          docker compose version

      - name: Validate Maven reactor
        run: mvn -q -DskipTests validate

      - name: Validate Docker Compose rendering
        run: docker compose --env-file deploy/docker/.env.example -f deploy/docker/docker-compose.yml config --quiet
