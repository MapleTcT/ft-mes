management:
  health:
    db:
      enabled: false
  endpoints:
    web:
      exposure:
        include:
          - "health"
          - "info"
          - "prometheus"
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: 8080
  servlet:
    context-path: /

supfusion:
  kafka:
    bootstrap:
      server: ${SUPOS_KAFKA_BROKERS:kafka:9092}
  notification:
    thread:
      coreSize: 5
      maxPoolSzie: 5
      queueSize: 200
  cloud:
    nacos:
      server-addr: ${SUPOS_NACOS_ADDRESS:nacos:8848}
      username: ${SUPOS_NACOS_USERNAME:nacos}
      password: ${SUPOS_NACOS_PASSWORD:nacos}
    i18n:
      enabled: true
      host: http://i18n-service:8080
      basename: i18n/
      locale-modules:
        - notificationEngine
      module-versions:
        - notificationEngine202007171453
      modules:
        - notificationEngine
        - notificationEmail
    config-center:
      enabled: true
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
      type: yaml
    registry:
      enabled: true
      secure: false
      weight: 1
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
    discovery:
      enabled: true
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
    datasource:
      connect:
        use-system: ${SUPOS_SYSTEM_DB_USE:false}
        system:
          db-type: ${SUPOS_SYSTEM_DB_TYPE:mariadb}
          db-name: ${SUPOS_SYSTEM_DB_NAME:fusion}
          host: ${SUPOS_SYSTEM_DB_HOST:mariadb}
          port: ${SUPOS_SYSTEM_DB_PORT:3306}
          username: ${SUPOS_SYSTEM_DB_USERNAME:root}
          password: ${SUPOS_SYSTEM_DB_PASSWORD:123456}
      druid:
        init-pool-size: 1
        min-pool-size: 1
        max-pool-size: 10
        show-log: true
      script:
        script-root-dirs: classpath*:META-INF/
    tenant:
      sync-cache: ${SUPOS_TENANT_SYNC_CACHE:true}
      init-getter: ${SUPOS_TENANT_INIT_GETTER:true}
      register: ${SUPOS_TENANT_REGISTER:true}

spring:
  application:
    name: notification-engine
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SUPOS_KAFKA_BROKERS:kafka:9092}
          auto-create-topics: true
      bindings:
        tenant-input:
          destination: supOS_tenant
          content-type: application/json
          group: ${spring.application.name}
  kafka:
    jaas:
      enabled: false

mybatis-plus:
  global-config:
    db-config:
      #主键类型 AUTO:"数据库ID自增" INPUT:"用户输入ID",ID_WORKER:"全局唯一ID (数字类型唯一ID)", UUID:"全局唯一ID UUID";
      id-type: INPUT
      # 乐观锁
      optimistic-lock-enabled: false
      # 逻辑删
      logic-delete-enabled: true
    banner: false
  configuration:
    # 是否开启自动驼峰命名规则映射:从数据库列名到Java属性驼峰命名的类似映射
    map-underscore-to-camel-case: true
    # 如果查询结果中包含空值的列，则 MyBatis 在映射的时候，不会映射这个字段
    call-setters-on-nulls: true
    # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

feign:
  client:
    default-config: default
    default-to-properties: true
    config:
      default:
        connect-timeout: 2000
        read-timeout: 12000
  httpclient:
    enabled: true