management:
  health:
    db:
      enabled: false

server:
  port: 8388
  servlet:
    context-path: /

supfusion:
  websocket:
    host: 10.30.44.61:9010
  kafka:
    bootstrap:
      server: localhost:9092
  notification:
    thread:
      coreSize: 5
      maxPoolSzie: 5
      queueSize: 200
  cloud:
    nacos:
      server-addr: localhost:8848
      username: nacos
      password: nacos
    config-center:
      enabled: true
      group: DEFAULT_GROUP
      type: yaml
    registry:
      enabled: true
      secure: false
      weight: 1
      group: DEFAULT_GROUP
    discovery:
      enabled: true
      group: DEFAULT_GROUP
    datasource:
      druid:
        init-pool-size: 1
        min-pool-size: 1
        max-pool-size: 10
        validationQuerySql: SELECT 1 FROM DUAL
      script:
        script-root-dirs: classpath*:META-INF/
      connect:
        use-system: true
        system:
          db-type: mariadb
          db-name: supfusion_notification
          host: 127.0.0.1
          port: 3306
          username: root
          password: 123456
    tenant:
      sync-cache: false
      init-getter: false
  swagger:
    enable: true

spring:
  application:
    name: notification-engine
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092
          zk-nodes: localhost:2181
          auto-create-topics: true
      bindings:
        tenant-input:
          destination: supOS_tenant
          content-type: application/json
          group: ${spring.application.name}

mybatis-plus:
  global-config:
    db-config:
      #主键类型 AUTO:"数据库ID自增" INPUT:"用户输入ID",ID_WORKER:"全局唯一ID (数字类型唯一ID)", UUID:"全局唯一ID UUID";
      id-type: INPUT
      # 乐观锁
      optimistic-lock-enabled: false
      # 逻辑删
      logic-delete-enabled: true
    banner: false
  configuration:
    # 是否开启自动驼峰命名规则映射:从数据库列名到Java属性驼峰命名的类似映射
    map-underscore-to-camel-case: true
    # 如果查询结果中包含空值的列，则 MyBatis 在映射的时候，不会映射这个字段
    call-setters-on-nulls: true
    # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl