        <div class="title">当前账号的认证信息已经过期，即将跳转到登录页面！</div>
        <div></div>
        <div id="time">剩余<span>3</span>秒</div>
        <div class="login-btn" onclick="goLogin()">重新登录</div>
    </div>
    <script>
        var start = 2;
        setInterval(function () {
            if (start >= 0) {
                document.getElementById('time').getElementsByTagName('span')[0].innerText = start;
                start--;
            } else {
                // 跳转登录页
                goLogin()
            }
        }, 1000);

        function getQueryString(name) {
            var url = window.location.href;
            var paramIndex = url.indexOf('?');
            var res = null;
            if (paramIndex > -1) {
                var paramStr = url.substring(paramIndex + 1, url.length);
                var paramArr = paramStr.split('&');
                for (var index = 0; index < paramArr.length; index++) {
                    var item = paramArr[index];
                    const pi = item.split('=');
                    if (pi[0] === name) {
                        res = pi[1];
                        break;
                    }
                }
            }
            return res;
        }

        function goLogin() {
            var redirectUrl = getQueryString('redirectUrl');
            var root = window.top.location.origin + '/';
            if (redirectUrl) {
                var redirectUrlReal = decodeURIComponent(redirectUrl);
                var arr = redirectUrlReal.match(/(.*?):\/\/(.*?)\/(.*?)/);
                arr ? root = arr[0] : null;
                var str = 'login.html';
                if (window.top == window) {
                    str = "login.html?redirectUrl=" + redirectUrl;
                }
                window.top.location.href = root + str;
            } else window.top.location.href = root;
        }

        // 返回上一个页面
        function pageBackFunc() {
            try {
                window.mobilejs.close();
            } catch (err) {
                try {
                    window.parent.window.mobilejs.close();
                } catch (err) {
                    try {
                        window.history.back();
                    } catch (err) {

                    }
                }
            }
        }

        //判断设备类型
        function phoneType() {
            let ua = window.navigator.userAgent,
                app = window.navigator.appVersion,
                phoneType;
            if (!!ua.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/)) {
                // ios端
                phoneType = "ios";
            } else if (ua.indexOf("Android") > -1 || ua.indexOf("Adr") > -1) {
                // android端
                phoneType = "android";
            }
            return phoneType;
        }

        if (phoneType() == "android" || phoneType() == "ios") {
            var content = document.getElementsByClassName("content")[0];
            document.getElementsByClassName("m_head")[0].style.display = "block";
            document.getElementsByClassName("icon")[0].classList.add("icon_phone");
            content.classList.add("content_phone");
            content.getElementsByClassName('title')[0].innerHTML = "当前账号的认证信息已经过期";
            content.getElementsByTagName('div')[1].innerHTML = "即将跳转到登录页面！";
            content.getElementsByTagName('div')[1].style.marginTop = '28px';
        } else {
            document.getElementsByClassName("m_head")[0].style.display = "none";
        }
    </script>
