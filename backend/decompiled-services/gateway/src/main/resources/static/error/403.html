      position: absolute;
      width: 100%;
      height: 50px;
      background: -webkit-linear-gradient(bottom, #2874d2, #2874d2);

      top: 0;
      left: 0;
    }

      height: 100%;
    }
    .m_hbox .head_arrow {
      position: absolute;
      top: 0;
      left: 0;
      display: inline-block;
      width: 70px;
      height: 50px;
      line-height: 50px;
    }
    .m_hbox .m_arrow {
      position: absolute;
      left: 25px;
      display: inline-block;
      width: 23px;
      height: 50px;
    }
    .m_hbox .m_arrow img {
      width: 45%;
      height: 35%;
      position: absolute;
      top: 50%;
      margin-top: -35%;
    }

    .m_hbox .m_title {
      color: #fff;
      text-align: center;
      font-size: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-left: 70px;
      margin-right: 70px;
      display: block;
    }
    .icon_phone {
      display: block;
      position: absolute;
      top: 27%;
    }
    .content_phone {
      width:100%;
      position: absolute;
      top: 50%;
    }

  function phoneType() {
    let ua = window.navigator.userAgent,
            app = window.navigator.appVersion,
            phoneType;
    if (!!ua.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/)) {
      // ios端
      phoneType = "ios";
    } else if (ua.indexOf("Android") > -1 || ua.indexOf("Adr") > -1) {
      // android端
      phoneType = "android";
    }
    return phoneType;
  }
