        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow:hidden;
        }

        .layout {
            display: flex;
            flex-direction: column;
            margin-top: 100px;
        }

        .content {
            width: 356px;
            height: 167px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .title {
            color: #8d8d8d;
            font-size: 16px;
        }

        .btns {
            display: flex;
            justify-content: space-around
        }

        .btnReload {
            margin: 0 auto;
            width: 116px;
            height: 42px;
            margin-top: 30px;
            line-height: 42px;
            text-align: center;
            border-radius: 21px;
            border: 1px solid #15a1a3;
            color: #15a1a3;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            margin-right: 20px
        }

        .btnError {
            margin: 0 auto;
            width: 124px;
            height: 42px;
            margin-top: 30px;
            line-height: 42px;
            text-align: center;
            border-radius: 21px;
            border: 1px solid #f77f6a;
            color: #f77f6a;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
        }

        .m_head {
            position: absolute;
            width: 100%;
            height: 50px;
            background: -webkit-linear-gradient(bottom, #2874d2, #2874d2);
            background: linear-gradient(to top, #2874d2, #2874d2);
            top: 0;
            left: 0;
        }
        .m_head .m_hbox {
            height: 100%;
        }
        .m_hbox .head_arrow {
            position: absolute;
            top: 0;
            left: 0;
            display: inline-block;
            width: 70px;
            height: 50px;
            line-height: 50px;
        }
        .m_hbox .m_arrow {
            position: absolute;
            left: 25px;
            display: inline-block;
            width: 23px;
            height: 50px;
        }
        .m_hbox .m_arrow img {
            width: 45%;
            height: 35%;
            position: absolute;
            top: 50%;
            margin-top: -35%;
        }

        .m_hbox .m_title {
            color: #fff;
            text-align: center;
            font-size: 18px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-left: 70px;
            margin-right: 70px;
            display: block;
        }
        .icon_phone {
            display: block;
        }
        .content_phone {
            width:100%;
        }

        .Triangle {
            display: inline-block;
            width: 0px;
            height: 0px;
            border-top: 5px solid #f77f6a;
            border-right: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 5px solid transparent;
            position: relative;
        }

        .ErrInfo {
            visibility: hidden;
            border-top: 1px solid #ccc;
            width: 70%;
            height: 300px;
            overflow: auto;
            padding: 15px;
            font-size: 12px
        }
    </style>

<script>
    // 返回上一个页面
    function pageBackFunc() {
        try {
            window.mobilejs.close();
        } catch (err) {
            try {
                window.parent.window.mobilejs.close();
            } catch (err) {
                try {
                    window.history.back();
                } catch (err) {

                }
            }
        }
    }


    function UrlSearch() {
        var name,value;
        var str=location.href; //取得整个地址栏
        var num=str.indexOf("?")
        str=str.substr(num+1); //取得所有参数   stringvar.substr(start [, length ]

        var arr=str.split("&"); //各个参数放到数组里
        console.log(arr)
        for(var i=0;i < arr.length;i++){
            num=arr[i].indexOf("=");
            if(num>0){
                name=arr[i].substring(0,num);
                value=arr[i].substr(num+1);
                this[name]=value;
            }
        }
    }

    UrlSearch();

    document.getElementById('err').innerHTML = decodeURIComponent(errorMessage);

    //判断设备类型
    function phoneType() {
        let ua = window.navigator.userAgent,
            app = window.navigator.appVersion,
            phoneType;
        if (!!ua.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/)) {
            // ios端
            phoneType = "ios";
        } else if (ua.indexOf("Android") > -1 || ua.indexOf("Adr") > -1) {
            // android端
            phoneType = "android";
        }
        return phoneType;
    }

    if (phoneType() == "android" || phoneType() == "ios") {
        document.getElementsByClassName("m_head")[0].style.display = "block";
        document.getElementsByClassName("icon")[0].classList.add("icon_phone");
        document.getElementsByClassName("content")[0].classList.add("content_phone");
    } else {
        document.getElementsByClassName("m_head")[0].style.display = "none";
    }
</script>

    var triangle = document.querySelector('.Triangle');
    var errInfo = document.querySelector('.ErrInfo');
    function handleClick() {
        triangle.style.transform = 'rotate(180deg)';
        triangle.style.bottom = '4px';
        errInfo.style.visibility = 'visible';
    }
</script>
