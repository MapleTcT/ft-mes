<script>
    // 返回上一个页面
    function pageBackFunc() {
        try {
            window.mobilejs.close();
        } catch (err) {
            try {
                window.parent.window.mobilejs.close();
            } catch (err) {
                try {
                    window.history.back();
                } catch (err) {

                }
            }
        }
    }

    //判断设备类型
    function phoneType() {
        let ua = window.navigator.userAgent,
            app = window.navigator.appVersion,
            phoneType;
        if (!!ua.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/)) {
            // ios端
            phoneType = "ios";
        } else if (ua.indexOf("Android") > -1 || ua.indexOf("Adr") > -1) {
            // android端
            phoneType = "android";
        }
        return phoneType;
    }

    if (phoneType() == "android" || phoneType() == "ios") {
        document.getElementsByClassName("m_head")[0].style.display = "block";
        document.getElementsByClassName("icon")[0].classList.add("icon_phone");
        document.getElementsByClassName("content")[0].classList.add("content_phone");
    } else {
        document.getElementsByClassName("m_head")[0].style.display = "none";
    }
</script>
