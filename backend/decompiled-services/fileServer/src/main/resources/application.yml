management:
  health:
    db:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: ${MONITOR_ENABLED:true}
    binders:
      files:
        enabled: ${MONITOR_ENABLED:true}
      jvm:
        enabled: ${MONITOR_ENABLED:true}
      logback:
        enabled: ${MONITOR_ENABLED:true}
      processor:
        enabled: ${MONITOR_ENABLED:true}
      uptime:
        enabled: ${MONITOR_ENABLED:true}
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: ALWAYS
    shutdown:
      enabled: false
spring:
  application:
    name: file-server
  profiles:
    active: prod
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SUPOS_KAFKA_BROKERS:kafka:9092}
          auto-create-topics: true
      bindings:
        tenant-input:
          destination: supOS_tenant
          content-type: application/json
          group: ${spring.application.name}
    nacos:
      config:
        enabled: false
server:
  port: 8080
  tomcat:
    max-swallow-size: 2048MB
supfusion:
  cloud:
    jwt:
      enabled: ${SUPOS_JWT_ENABLED:true}
      header: ${SUPOS_JWT_HEADER:Authorization}
      tokenHead: ${SUPOS_JWT_HEADER_TOKEN:Bearer}
      symmetric: false
      secret: 
      expiration: 604800
    nacos:
      server-addr: ${SUPOS_NACOS_ADDRESS:localhost:8848}
      username: ${SUPOS_NACOS_USERNAME:nacos}
      password: ${SUPOS_NACOS_PASSWORD:nacos}
    config-center:
      enabled: true
      type: json
    registry:
      enabled: true
      secure: false
      weight: 1
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
      partition: true
    discovery:
      enabled: true
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
      partition: true
    datasource:
      connect:
        use-system: ${SUPOS_SYSTEM_DB_USE:true}
        system:
          db-type: ${SUPOS_SYSTEM_DB_TYPE:mariadb}
          db-name: ${SUPOS_SYSTEM_DB_NAME:supfusion_i18n}
          host: ${SUPOS_SYSTEM_DB_HOST:mariadb}
          port: ${SUPOS_SYSTEM_DB_PORT:3306}
          username: ${SUPOS_SYSTEM_DB_USERNAME:root}
          password: ${SUPOS_SYSTEM_DB_PASSWORD:123456}
      druid:
        init-pool-size: ${SUPOS_DS_MIN_POOL_SIZE:10}
        min-pool-size: ${SUPOS_DS_MIN_POOL_SIZE:10}
        max-pool-size: ${SUPOS_DS_MAX_POOL_SIZE:200}
        idle-live-millis: ${SUPOS_DS_IDLE_TIME:30000}
        connection-timeout: ${SUPOS_DS_CONN_TIME:15000}
        max-live-millis: ${SUPOS_DS_LIVE_TIME:1800000}
      script:
        script-root-dirs: classpath*:META-INF/
        version-prefix: '##'
    tenant:
      sync-cache: ${SUPOS_TENANT_SYNC_CACHE:true}
      init-getter: ${SUPOS_TENANT_INIT_GETTER:true}
      register: ${SUPOS_TENANT_REGISTER:true}
    i18n:
      enabled: true
      host: http://i18n-service:8080
      locale-modules:
        - fileServer
      module-versions:
        - fileServer202010241032
      basename: i18n/
      modules:
        - fileServer
    file:
      filePreview: false #开启附件预览
      bap:
        list:
          maxPageSize: 500
        import:
          excel:
            maxsize: 500
mybatis-plus:
  type-aliases-package: com.supcon.supfusion.file.server.dao.po
  mapper-locations:
    - classpath:com/supcon/supfusion/file/server/dao/mapper/${supfusion.cloud.datasource.connect.system.db-type}/*.xml
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: false
  global-config:
    banner: false
    db-config:
      id-type: ID_WORKER
      field-strategy: NOT_EMPTY
      db-type: ${supfusion.cloud.datasource.connect.system.db-type}
      logic-delete-enabled: false
      optimistic-lock-enabled: false
feign:
  client:
    default-config: default
    default-to-properties: true
    config:
      default:
        connect-timeout: 2000
        read-timeout: 12000
  httpclient:
    enabled: true
minio:
  endpoint: http://${SUPOS_MINIO_IP:supfusion-minio}:${SUPOS_MINIO_PORT:9000}
  accessKey: ${SUPOS_MINIO_ACCESSKEY:minioadmin}
  secretKey: ${SUPOS_MINIO_SECRETKEY:minioadmin}
  fileTypes: doc,md,mp3,mp4,xlsx,txt,png,jpg,zip,xml,properties,bat,exe,pdf,htm,html,pptx,ppt,7z,tar,jar,rar,xls,docx,PNG,bmp,gif,jpeg