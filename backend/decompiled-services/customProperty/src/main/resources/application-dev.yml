management:
  health:
    db:
      enabled: false
server:
  port: 30205
  servlet:
    context-path: /
spring:
  application:
    name: coustom-property
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
  jpa:
    database-platform: org.hibernate.dialect.Oracle10gDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
supfusion:
  cloud:
    nacos:
      server-addr: ${SUPOS_NACOS_ADDRESS:192.168.91.63:8848}
      username: ${SUPOS_NACOS_USERNAME:nacos}
      password: ${SUPOS_NACOS_PASSWORD:nacos}
    registry:
      enabled: true
      secure: false
      weight: 1
      group: ${SUPOS_NACOS_REGISTRY_GROUP:prod}
    discovery:
      enabled: true
      group: ${SUPOS_NACOS_REGISTRY_GROUP:prod}
    datasource:
      connect:
        use-system: true
        system:
          db-type: ${DB_TYPE:oracle}
          db-name: ${DB_NAME:orcl}
          host: ${HOST:192.168.90.164}
          port: ${PORT:1521}
          username: ${USER_NAME:supfusion22}
          password: ${PASS_WORD:1}
      druid:
        init-pool-size: 1
        min-pool-size: 1
        max-pool-size: 15
        validationQuerySql: ${VALIDATION_QUERY_SQL:SELECT 1 FROM DUAL}
      script:
        script-root-dirs: classpath*:META-INF/
    i18n:
      enabled: true
      host: http://192.168.91.63:30130
      basename: i18n/
      locale-modules:
        - customProperty
      module-versions:
        - customProperty20200101600002
      modules:
        - customProperty
      use-get-all-module: true
      heartbeat-seconds: 30
  swagger:
    enable: true
feign:
  client:
    default-config: default
    default-to-properties: true
    config:
      default:
        connect-timeout: 1000
        read-timeout: 2000
mybatis-plus:
#  mapper-locations:
  #    - classpath:mappers/${DB_TYPE:mariadb}/*.xml
  global-config:
    db-config:
      #主键类型 AUTO:"数据库ID自增" INPUT:"用户输入ID",ID_WORKER:"全局唯一ID (数字类型唯一ID)", UUID:"全局唯一ID UUID";
      id-type: INPUT
      # 乐观锁
      optimistic-lock-enabled: false
      # 逻辑删
      logic-delete-enabled: true
    banner: false
  configuration:
    # 是否开启自动驼峰命名规则映射:从数据库列名到Java属性驼峰命名的类似映射
    map-underscore-to-camel-case: true
    # 如果查询结果中包含空值的列，则 MyBatis 在映射的时候，不会映射这个字段
    call-setters-on-nulls: true
    # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl