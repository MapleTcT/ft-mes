management:
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: ${MONITOR_ENABLED:true}
    binders:
      files:
        enabled: ${MONITOR_ENABLED:true}
      jvm:
        enabled: ${MONITOR_ENABLED:true}
      logback:
        enabled: ${MONITOR_ENABLED:true}
      processor:
        enabled: ${MONITOR_ENABLED:true}
      uptime:
        enabled: ${MONITOR_ENABLED:true}
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: ALWAYS
    shutdown:
      enabled: false

spring:
  profiles:
    active: prod
  redis:
    host: ${SUPOS_REDIS_HOST:redis}
    port: ${SUPOS_REDIS_PORT:6379}
  application:
    name: basicmanagement
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SUPOS_KAFKA_BROKERS:127.0.0.1:9092}
          zk-nodes: ${SUPOS_ZOOKEEPER_NODES:127.0.0.1:2181}
          auto-create-topics: true
      bindings:
        tenant-input:
          destination: supOS_tenant
          content-type: application/json
          group: ${spring.application.name}
        signature_input_log:
          destination: topic.signature.log
          binder: kafka
          content-type: application/json
          group: ${spring.application.name}
  kafka:
    jaas:
      enabled: false

server:
  port: 30225
  servlet:
    context-path: /
  tomcat:
    max-threads: ${SUPOS_TOMCAT_MAX_THREAD:200}

supfusion:
  cloud:
    scan:
      enabled: false
      host: http://rbac-service:8080
    i18n:
      enabled: ${SUPOS_I18N_ENBALED:true}
      heartbeat-seconds: 30
      host: http://i18n-service:8080
      locale-modules:
        - theme
        - portal
        - signature
        - printer
      module-versions:
        - theme202105271451
        - portal202105271451
        - signature202105271451
        - printer202105271451
      basename: i18n/
      use-get-all-module: true
      modules:
        - theme
        - portal
        - signature
        - printer
    jwt:
      enabled: ${SUPOS_JWT_ENABLED:true}
      header: ${SUPOS_JWT_HEADER:Authorization}
      token-head: ${SUPOS_JWT_HEADER_TOKEN:Bearer}
      symmetric: false
      secret: 
      expiration: 604800
    nacos:
      server-addr: ${SUPOS_NACOS_ADDRESS:nacos:8848}
      username: ${SUPOS_NACOS_USERNAME:nacos}
      password: ${SUPOS_NACOS_PASSWORD:nacos}
    registry:
      enabled: true
      secure: false
      weight: 1
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
    discovery:
      enabled: true
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
    config-center:
      enabled: true
    datasource:
      connect:
        use-system: ${SUPOS_SYSTEM_DB_USE:false}
        system:
          db-type: ${SUPOS_SYSTEM_DB_TYPE:mariadb}
          db-name: ${SUPOS_SYSTEM_DB_NAME:fusion}
          host: ${SUPOS_SYSTEM_DB_HOST:mariadb}
          port: ${SUPOS_SYSTEM_DB_PORT:3306}
          username: ${SUPOS_SYSTEM_DB_USERNAME:root}
          password: ${SUPOS_SYSTEM_DB_PASSWORD:123456}
      druid:
        init-pool-size: ${SUPOS_DS_MIN_POOL_SIZE:3}
        min-pool-size: ${SUPOS_DS_MIN_POOL_SIZE:3}
        max-pool-size: ${SUPOS_DS_MAX_POOL_SIZE:20}
        idle-live-millis: ${SUPOS_DS_IDLE_TIME:30000}
        max-live-millis: ${SUPOS_DS_LIVE_TIME:90000}
        connection-timeout: ${SUPOS_DS_CONN_TIME:30000}
      script:
        script-root-dirs: classpath*:META-INF/
        version-prefix: '##'
    tenant:
      sync-cache: ${SUPOS_TENANT_SYNC_CACHE:true}
      init-getter: ${SUPOS_TENANT_INIT_GETTER:true}
      register: ${SUPOS_TENANT_REGISTER:true}

mybatis-plus:
  type-aliases-package: com.supcon.supfusion.theme.dao.po,com.supcon.supfusion.portal.dao.entity,com.supcon.supfusion.printer.dao.po
  mapper-locations:
    - classpath:mappers/${supfusion.cloud.datasource.connect.system.db-type}/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      logic-delete-enabled: false
      optimistic-lock-enabled: false