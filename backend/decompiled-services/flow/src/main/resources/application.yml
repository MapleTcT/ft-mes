management:
  health:
    db:
      enabled: false
  endpoints:
    web:
      exposure:
        include:
          - "health"
          - "info"
          - "prometheus"
  metrics:
    tags:
      application: ${spring.application.name}
server:
  port: 8080
  servlet:
    context-path: /
spring:
  application:
    name: flow-service
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SUPOS_KAFKA_BROKERS:kafka:9092}
          auto-create-topics: true
      bindings:
        tenant-input:
          destination: supOS_tenant
          content-type: application/json
          group: ${spring.application.name}
    nacos:
      config:
        enabled: false
        refresh-enabled: false
      server-addr: ${supfusion.cloud.nacos.server-addr}
      username: ${supfusion.cloud.nacos.username}
      password: ${supfusion.cloud.nacos.password}
  kafka:
    jaas:
      enabled: false
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
  cache:
    use-tenant-prefix: false  # true: 在原有缓存key的基础上加上租户信息前缀, <tenantId>:<originKey>
    cacheTtl: PT1H20M50S  # SpringCache Duration ttl
    cache-null-values: false  # SpringCache 是否缓存null值
  redis:
    host: ${SUPOS_REDIS_HOST:redis}
    port: ${SUPOS_REDIS_PORT:6379}
supfusion:
  swagger:
    enable: true
  cloud:
    tenant:
      sync-cache: ${SUPOS_TENANT_SYNC_CACHE:true}
      init-getter: ${SUPOS_TENANT_INIT_GETTER:true}
      register: ${SUPOS_TENANT_REGISTER:false}
    i18n:
      enabled: true
      host: http://i18n-service:8080
      locale-modules:
        - workflow
      module-versions: 
        - workflow202103021706
      basename: i18n/
      temp: /tmp/i18n
      modules:
        - workflow
      use-get-all-module: true
    jwt:
      enabled: true
      header: Authorization
      tokenHead: Bearer
      symmetric: false
      secret: 
      expiration: 604800
    nacos:
      server-addr: ${SUPOS_NACOS_ADDRESS:nacos:8848}
      username: ${SUPOS_NACOS_USERNAME:nacos}
      password: ${SUPOS_NACOS_PASSWORD:nacos}
    config-center:
      enabled: false
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
      type: yaml
    registry:
      enabled: true
      secure: false
      weight: 1
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
    discovery:
      enabled: true
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
    datasource:
      druid:
        init-pool-size: 1
        min-pool-size: 1
        max-pool-size: 10
        show-log: true
      script:
        script-root-dirs: classpath*:META-INF/
        version-prefix: '##'
      connect:
        use-system: true
        system:
          db-type: ${SUPOS_SYSTEM_DB_TYPE:mariadb}
          db-name: ${SUPOS_SYSTEM_DB_NAME}
          host: ${SUPOS_SYSTEM_DB_HOST}
          port: ${SUPOS_SYSTEM_DB_PORT}
          username: ${SUPOS_SYSTEM_DB_USERNAME}
          password: ${SUPOS_SYSTEM_DB_PASSWORD}

mybatis-plus:
  mapper-locations:
    - classpath:mappers/${supfusion.cloud.datasource.connect.system.db-type}/*.xml
  type-aliases-package: com.supcon.supfusion.flow.common.po
  configuration:
    log-impl: 
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      logic-delete-enabled: false
      optimistic-lock-enabled: false
feign:
  client:
    default-config: default
    default-to-properties: true
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
  httpclient:
    enabled: true
        
