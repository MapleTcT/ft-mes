management:
  health:
    db:
      enabled: false
server:
  port: 8091
  servlet:
    context-path: /
spring:
  application:
    name: flow-service
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SUPOS_KAFKA_BROKERS:10.30.44.61:9092}
          zk-nodes: ${SUPOS_ZOOKEEPER_NODES:10.30.44.61:2181}
          auto-create-topics: true
      bindings:
        tenant-input:
          destination: supOS_tenant
          content-type: application/json
          group: ${spring.application.name}
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
supfusion:
  cloud:
    nacos:
      server-addr: ${SUPOS_NACOS_ADDRESS:10.30.44.61:8848}
      username: ${SUPOS_NACOS_USERNAME:nacos}
      password: ${SUPOS_NACOS_PASSWORD:nacos}
    config-center:
      enabled: false
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
      type: yaml
    registry:
      enabled: true
      secure: false
      weight: 1
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
    discovery:
      enabled: true
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
    datasource:
      druid:
        init-pool-size: 1
        min-pool-size: 1
        max-pool-size: 10
        show-log: true
      script:
        script-root-dirs: classpath*:META-INF/
      connect:
        use-system: true
        system:
          db-type: ${SUPOS_DATABASE_TYPE:mariadb}
          db-name: ${SUPOS_DATABASE_NAME:saas}
          host: ${SUPOS_DATABASE_HOST:127.0.0.1}
          port: ${SUPOS_DATABASE_PORT:3306}
          username: ${SUPOS_DATABASE_USER:root}
          password: ${SUPOS_DATABASE_PWD:123456}
    tenant:      
      sync-cache: false
      init-getter: false
      register: false
    i18n:
      enabled: false
      host: http://10.30.44.61:8080
      locale-modules: 
        - workflow
      module-versions: 
        - workflow202007061541
      basename: i18n/
      temp: /tmp/i18n
      modules:
        - workflow
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 2000
mybatis-plus:
  type-aliases-package: com.supcon.supfusion.flow.common.po
  configuration:
    log-impl: 
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      logic-delete-enabled: false
      optimistic-lock-enabled: false
