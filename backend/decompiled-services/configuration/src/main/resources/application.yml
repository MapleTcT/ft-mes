management:
  endpoint:
    health:
      show-details: ALWAYS
    shutdown:
      enabled: false
  endpoints:
    web:
      exposure:
        include: '*'
  health:
    db:
      enabled: false
  metrics:
    binders:
      files:
        enabled: ${MONITOR_ENABLED:true}
      jvm:
        enabled: ${MONITOR_ENABLED:true}
      logback:
        enabled: ${MONITOR_ENABLED:true}
      processor:
        enabled: ${MONITOR_ENABLED:true}
      uptime:
        enabled: ${MONITOR_ENABLED:true}
    export:
      prometheus:
        enabled: ${MONITOR_ENABLED:true}
    tags:
      application: ${spring.application.name}
spring:
  application:
    name: ec
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
  freemarker:
    content-type: text/html
    suffix: .ftl
    template-loader-path: file:./templates/,classpath:/templates/
  servlet:
    multipart:
      max-file-size: 300MB
      max-request-size: 300MB
  messages:
    basename: i18n
  main:
    allow-bean-definition-overriding: true

server:
  port: 30000
  servlet:
    context-path: /
supfusion:
  cloud:
    default-tenant-id: default
    nacos:
      server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
      username: ${SUPOS_NACOS_USERNAME:nacos}
      password: ${SUPOS_NACOS_PASSWORD:nacos}
    registry:
      enabled: true
      secure: false
      weight: 1
      group: ${SUPOS_NACOS_REGISTRY_GROUP:prod}
    discovery:
      enabled: true
      group: ${CLOUD_DISCOVERY_GROUP:prod}
    hibernate:
      show-sql: false
    datasource:
      connect:
        use-system: true
        system:
          db-type: ${SUPOS_SYSTEM_DB_TYPE:oracle}
          db-name: ${SUPOS_SYSTEM_DB_NAME:orcl}
          host: ${SUPOS_SYSTEM_DB_HOST:127.0.0.1}
          port: ${SUPOS_SYSTEM_DB_PORT:1521}
          username: ${SUPOS_SYSTEM_DB_USERNAME:orcl}
          password: ${SUPOS_SYSTEM_DB_PASSWORD:1}
      script:
        script-root-dirs: classpath*:META-INF/
        version-prefix: '##'
      druid:
        validation-query-sql: SELECT 1 FROM DUAL
        init-pool-size: 1
        min-pool-size: 1
        max-pool-size: 10
    i18n:
      enabled: true
      host: http://${I18N_HOST:i18n-service}:${I18N_PORT:30130}
      locale-modules:
        - appConfig
      module-versions:
        - appConfig202105310905
      basename: i18n/
      modules:
        - appConfig
      useGetAllModule: true
      heartbeat-seconds: 60
    jwt:
      enabled: true
      header: Authorization
      tokenHead: Bearer
      symmetric: false
      secret: 
      expiration: 604800
  swagger:
    enable: false

mybatis-plus:
  type-aliases-package: com.supcon.supfusion.framework.demo.server.dao.po
  type-handlers-package: com.supcon.supfusion.framework.demo.server.dao.typehandler
  configuration:
    map-underscore-to-camel-case: true

feign:
  client:
    config:
      remote-service:
        connectTimeout: 60000
        readTimeout: 60000
ribbon:
  ReadTimeout: 60000
  ConnectTimeout: 60000

configuration-services:
  workspace: ${CONFIGURATION_WORKSPACE:../../data}
  uploadLogPath: ${work.dir}/logs/appUpload
