management:
  health:
    db:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: ${MONITOR_ENABLED:true}
    binders:
      files:
        enabled: ${MONITOR_ENABLED:true}
      jvm:
        enabled: ${MONITOR_ENABLED:true}
      logback:
        enabled: ${MONITOR_ENABLED:true}
      processor:
        enabled: ${MONITOR_ENABLED:true}
      uptime:
        enabled: ${MONITOR_ENABLED:true}
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: ALWAYS
    shutdown:
      enabled: false
spring:
  application:
    name: supplant-license
  redis:
    host: ${SUPOS_REDIS_HOST:redis}
    port: ${SUPOS_REDIS_PORT:6379}
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB
  cloud:
    stream:
      bindings:
        tenant-input:
          destination: supOS_tenant
          content-type: application/json
          group: ${spring.application.name}
    nacos:
      config:
        enabled: false
server:
  port: 8080
  tomcat:
    max-swallow-size: 2048MB
supfusion:
  cloud:
    jwt:
      enabled: ${SUPOS_JWT_ENABLED:true}
      header: ${SUPOS_JWT_HEADER:Authorization}
      tokenHead: ${SUPOS_JWT_HEADER_TOKEN:Bearer}
      symmetric: false
      secret: 
      expiration: 604800
    nacos:
      server-addr: ${SUPOS_NACOS_ADDRESS:127.0.0.1:8848}
      username: ${SUPOS_NACOS_USERNAME:nacos}
      password: ${SUPOS_NACOS_PASSWORD:nacos}
    config-center:
      enabled: true
      type: json
    registry:
      enabled: true
      secure: false
      weight: 1
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
      partition: true
      instanceAliases:
        - license
    discovery:
      enabled: true
      group: ${SUPOS_NACOS_REGISTRY_GROUP:DEFAULT_GROUP}
      partition: true
    datasource:
      connect:
        use-system: ${SUPOS_SYSTEM_DB_USE:true}
        system:
          db-type: ${SUPOS_SYSTEM_DB_TYPE:oracle}
          db-name: ${SUPOS_SYSTEM_DB_NAME:orcl}
          host: ${SUPOS_SYSTEM_DB_HOST:192.168.90.164}
          port: ${SUPOS_SYSTEM_DB_PORT:1521}
          username: ${SUPOS_SYSTEM_DB_USERNAME:supfusion32}
          password: ${SUPOS_SYSTEM_DB_PASSWORD:1}
      druid:
        init-pool-size: ${SUPOS_DS_MIN_POOL_SIZE:10}
        min-pool-size: ${SUPOS_DS_MIN_POOL_SIZE:10}
        max-pool-size: ${SUPOS_DS_MAX_POOL_SIZE:200}
        idle-live-millis: ${SUPOS_DS_IDLE_TIME:30000}
        connection-timeout: ${SUPOS_DS_CONN_TIME:15000}
        max-live-millis: ${SUPOS_DS_LIVE_TIME:1800000}
      script:
        script-root-dirs: classpath*:META-INF/
        version-prefix: '##'
    tenant:
      sync-cache: ${SUPOS_TENANT_SYNC_CACHE:true}
      init-getter: ${SUPOS_TENANT_INIT_GETTER:true}
      register: ${SUPOS_TENANT_REGISTER:false}
mybatis-plus:
  type-aliases-package: com.supcon.supfusion.license.dao.po
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      logic-delete-enabled: false
      optimistic-lock-enabled: false
license:
  ip: ${LICENSE_CONFIG_IP:127.0.0.1}