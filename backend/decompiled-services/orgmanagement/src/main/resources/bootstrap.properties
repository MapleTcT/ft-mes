server.port=30215
spring.application.name=supfusion-orgmanagement
spring.profiles.active=prod
supfusion.cloud.config-center.enabled=true
spring.cloud.nacos.config.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.extension-configs[0].data-id=supfusion-redis-system.properties
spring.cloud.nacos.config.extension-configs[0].group=${spring.profiles.active:prod}
spring.cloud.nacos.config.extension-configs[0].refresh=false
spring.cloud.nacos.config.extension-configs[1].data-id=supfusion-registry.properties
spring.cloud.nacos.config.extension-configs[1].group=${spring.profiles.active:prod}
spring.cloud.nacos.config.extension-configs[1].refresh=false
spring.cloud.nacos.config.extension-configs[2].data-id=supfusion-datasource-system.properties
spring.cloud.nacos.config.extension-configs[2].group=${spring.profiles.active:prod}
spring.cloud.nacos.config.extension-configs[2].refresh=false
spring.cloud.nacos.config.extension-configs[3].data-id=supfusion-jwt-common.properties
spring.cloud.nacos.config.extension-configs[3].group=${spring.profiles.active:prod}
spring.cloud.nacos.config.extension-configs[3].refresh=false
spring.cloud.nacos.config.extension-configs[4].data-id=supfusion-mybatis-common.properties
spring.cloud.nacos.config.extension-configs[4].group=${spring.profiles.active:prod}
