spring:
  profiles:
    active: prod
  cloud:
    nacos:
      config:
        server-addr: http://${nacos:127.0.0.1}:8848
        extension-configs:
          - data-id: supfusion-notification-apiserver.properties
            group: ${spring.profiles.active:prod}
            refresh: false
          - data-id: supfusion-datasource-system.properties
            group: ${spring.profiles.active:prod}
            refresh: false
          - data-id: supfusion-mybatis-common.properties
            group: ${spring.profiles.active:prod}
            refresh: false
          - data-id: supfusion-i18n-system.properties
            group: ${spring.profiles.active:prod}
            refresh: false
          - data-id: supfusion-registry.properties
            group: ${spring.profiles.active:prod}
            refresh: false
          - data-id: supfusion-jwt-common.properties
            group: ${spring.profiles.active:prod}
            refresh: false
          - data-id: supfusion-kafka-system.properties
            group: ${spring.profiles.active:prod}
            refresh: false