management:
  health:
    db:
      enabled: false
server:
  port: 8080
  servlet:
    context-path: /
spring:
  application:
    name: customProperty
  datasource:
    type: com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
    initialization-mode: never
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${SUPOS_KAFKA_BROKERS:127.0.0.1:9092}
          zk-nodes: ${SUPOS_ZOOKEEPER_NODES:zookeeper:2181}
          auto-create-topics: true
      bindings:
        tenant-input:
          destination: supOS_tenant
          content-type: application/json
          group: ${spring.application.name}
    nacos:
      config:
        enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
supfusion:
  cloud:
    nacos:
      server-addr: ${SUPOS_NACOS_ADDRESS:nacos:8848}
      username: ${SUPOS_NACOS_USERNAME:nacos}
      password: ${REPLACE_ME}
    registry:
      enabled: true
      secure: false
      weight: 1
      group: ${SUPOS_NACOS_REGISTRY_GROUP:prod}
      partition: true
    discovery:
      enabled: true
      group: ${SUPOS_NACOS_REGISTRY_GROUP:prod}
      partition: true
    datasource:
      connect:
        use-system: ${SUPOS_SYSTEM_DB_USE:true}
        system:
          db-type: ${SUPOS_SYSTEM_DB_TYPE:mariadb}
#          db-name: ${SUPOS_SYSTEM_DB_NAME:supfusion}
#          host: ${SUPOS_SYSTEM_DB_HOST:mariadb}
#          port: ${SUPOS_SYSTEM_DB_PORT:3306}
#          username: ${SUPOS_SYSTEM_DB_USERNAME:root}
#          password: ${REPLACE_ME}
      druid:
        init-pool-size: ${SUPOS_DS_MIN_POOL_SIZE:1}
        min-pool-size: ${SUPOS_DS_MIN_POOL_SIZE:1}
        max-pool-size: ${SUPOS_DS_MAX_POOL_SIZE:10}
        idle-live-millis: ${SUPOS_DS_IDLE_TIME:30000}
        connection-timeout: ${SUPOS_DS_CONN_TIME:15000}
        max-live-millis: ${SUPOS_DS_LIVE_TIME:1800000}
      script:
        script-root-dirs: classpath*:META-INF/
    tenant:
      sync-cache: false
      init-getter: false
      register: false
    i18n:
      enabled: true
      host: http://i18n-service:8080
      basename: i18n/
      locale-modules:
        - customProperty
      module-versions:
        - customProperty2021010700002
      modules:
        - customProperty
      use-get-all-module: true
      heartbeat-seconds: 30
    jwt:
      enabled: true
      header: Authorization
      tokenHead: ${REPLACE_ME}
      symmetric: false
      secret: ${REPLACE_ME}
      expiration: 604800
  swagger:
    enable: true
feign:
  client:
    default-config: default
    default-to-properties: true
    config:
      default:
        connect-timeout: 1000
        read-timeout: 2000
mybatis-plus:
  mapper-locations:
    - classpath:mappers/${supfusion.cloud.datasource.connect.system.db-type}/*.xml
  global-config:
    db-config:
      #主键类型 AUTO:"数据库ID自增" INPUT:"用户输入ID",ID_WORKER:"全局唯一ID (数字类型唯一ID)", UUID:"全局唯一ID UUID";
      id-type: INPUT
      # 乐观锁
      optimistic-lock-enabled: false
      # 逻辑删
      logic-delete-enabled: true
    banner: false
  configuration:
    # 是否开启自动驼峰命名规则映射:从数据库列名到Java属性驼峰命名的类似映射
    map-underscore-to-camel-case: true
    # 如果查询结果中包含空值的列，则 MyBatis 在映射的时候，不会映射这个字段
    call-setters-on-nulls: true
    # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
