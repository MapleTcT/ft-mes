workflow.help.not_found=暂无说明信息
workflow.help.normal_start=流程启动，通过用户主动发起。
workflow.help.signal_start=选择一个事件绑定，事件发生流程启动<br>可中断：用于子流程发起设置。信号开始，中断用户主动发起主流程<br>非中断：信号开始，用户主动发起流程继续执行。
workflow.help.timer=中间定时器：配置下个环节执行者收到待办时间<br>边界定时器：关联到人工活动节点上，约束活动的执行时间。时间内任务完成，定时器失效<br>时间内任务未完成，沿定时器分支执行下一步<br>可中断：定时器触发，用户任务中断<br>非中断：定时器触发，用户任务可继续执行
workflow.help.signal=信号分为捕获和抛出，一般成对出现，捕获和抛出信号通过其绑定的对象信号关联。
workflow.help.end=流程当前分支结束，其他分支继续执行。
workflow.help.termination=终止当前流程，不再执行任何动作.
workflow.help.usertask=当流程执行到达用户任务时，为该环节配置的执行者生成待办任务<br>只读：用户任务关联页面不可编辑<br>自动提交：选择一个对象事件，事件发生任务自动提交至下一步<br>延时时间：待办任务处理的截止时间
workflow.help.usertask_service=选择一个对象服务，待办任务在提交之后将执行该服务脚本，如果服务脚本执行失败，则任务提交失败。
workflow.help.servicetask=可以绑定对象服务，当流程进行到该环节，将执行关联服务。
workflow.help.countersign=当流程执行到会签任务时，为该环节配置的执行者生成待办任务，会签任务的执行者一般为多人，执行者必须都提交任务，才会提交至下一步。
workflow.help.subprocess=由事件启动，信号开始可以启动子流程。
workflow.help.reject=驳回给环节提交者
workflow.help.parallelgateway=网关所有输入分支都执行完成，流程才能继续执行。
workflow.help.exclusivegateway=执行互斥网关下一步满足条件的分支流程，每次有且只有一条分支满足条件。
workflow.help.compatiblygateway=执行相容网关下一步满足条件的分支流程，可同时满足多个分支条件，都不填写分支条件执行所有分支流程。
workflow.help.upgrade=升版之后系统将生成一条新的流程数据，流程编号保持不变，版本号+1，状态为未发布。升版前已发起的流程按原工作流执行。
workflow.help.notice.config=请联系管理员确保消息管理中默认主题设置配置正确
workflow.help.multi_company=跨公司为"是"时,执行者可选择在跨公司对象,已发布版本不可修改跨公司信息
workflow.help.pos_restrict=启用了岗位限制，查询和审批相应选择人员下级岗位制定的单据
workflow.help.appoint_pos=给予分配者指定一个本不属于他的岗位，使其拥有该岗位下的权限
workflow.help.appoint_person=给分配者指定哪些人员制定的单据可以查询或者审批
workflow.help.notification=如需其他通知方式，请在消息管理中进行配置