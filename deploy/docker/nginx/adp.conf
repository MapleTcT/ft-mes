server {
    listen 8080;
    server_name _;

    client_max_body_size 2048m;
    client_body_buffer_size 128k;
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    proxy_connect_timeout 300;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway_upstream http://gateway:8008;
    set $adp_accept_language $http_accept_language;
    if ($adp_accept_language = "") {
        set $adp_accept_language "zh-CN";
    }

    root /usr/share/nginx/html;
    index index.html index.htm;

    location ^~ /open-api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Language $adp_accept_language;
        proxy_pass $gateway_upstream;
    }

    location = /inter-api/i18n/v1/resource/code/all/module_ids/allkeyvalues {
        set $i18n_args $args;
        if ($arg_langu_code = "") {
            set $i18n_args "$args&langu_code=zh_CN";
        }
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Language $adp_accept_language;
        proxy_pass $gateway_upstream$uri?$i18n_args;
    }

    location = /inter-api/i18n/v1/resource/code/all/module_ids/forFrontNoGateWay {
        set $i18n_args $args;
        if ($arg_langu_code = "") {
            set $i18n_args "$args&langu_code=zh_CN";
        }
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Language $adp_accept_language;
        proxy_pass $gateway_upstream$uri?$i18n_args;
    }

    location ^~ /inter-api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Language $adp_accept_language;
        proxy_pass $gateway_upstream;
    }

    location ^~ /api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Language $adp_accept_language;
        proxy_pass $gateway_upstream;
    }

    location = /msService/RM/formula/formula/batchFormulaList-query {
        default_type application/json;
        return 200 '{"code":200,"data":{"first":1,"hasNext":false,"hasPre":false,"nextPage":1,"pageNo":1,"pageSize":20,"prePage":1,"result":[],"totalCount":0,"totalPages":0,"treeToSurfaceMode":false},"message":"操作成功"}';
    }

    location ^~ /msService/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Language $adp_accept_language;
        proxy_pass $gateway_upstream;
    }

    location ^~ /auth/realms {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Language $adp_accept_language;
        proxy_pass $gateway_upstream;
    }

    location = /api/auth/users/logout {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Language $adp_accept_language;
        proxy_pass $gateway_upstream;
    }

    location ^~ /inter-api/ws/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Language $adp_accept_language;
        proxy_pass $gateway_upstream;
    }

    location /greenDill/static/license/sso.html {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Credentials true;
        add_header Access-Control-Allow-Methods 'GET,POST,OPTIONS';
        add_header Access-Control-Allow-Headers 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With';
        try_files $uri =404;
    }

    location ~ ^/greenDill/static/.*/i18n-value\.js$ {
        default_type application/javascript;
        try_files $uri @empty_i18n_value_js;
    }

    location ~ ^/greenDill/static/.*/body(?:-es5)?\.js$ {
        default_type application/javascript;
        try_files $uri @empty_body_js;
    }

    location @empty_i18n_value_js {
        default_type application/javascript;
        return 200 "window.InternationalResource = window.InternationalResource || {};\n";
    }

    location @empty_body_js {
        default_type application/javascript;
        return 200 "void 0;\n";
    }

    location ~* \.(?:js|css)$ {
        try_files $uri =404;
    }

    location / {
        if ($request_filename !~* .*\.(?:js|css)$) {
            add_header Cache-Control "private, no-store, no-cache, must-revalidate, proxy-revalidate";
        }
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
