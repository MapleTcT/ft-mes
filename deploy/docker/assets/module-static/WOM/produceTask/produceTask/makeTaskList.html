			function loadUrlContent(url, successCallback, errorCallback) {
				var xhr = new XMLHttpRequest();
				xhr.open("GET", url, false);
				if ("overrideMimeType" in xhr) {
					xhr.overrideMimeType("text/plain");
				}
				xhr.onreadystatechange = function() {
					if (xhr.readyState === 4) {
					if (xhr.status === 0 || xhr.status === 200) {
						successCallback(xhr.responseText);
					} else {
						errorCallback && errorCallback();
						throw new Error("Could not load " + url);
					}
					}
				};
				return xhr.send(null);
			}
			var isChrome = window.chrome && /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
			if (!isChrome) {
				url += '-es5';
			}
			url += '.js?v=' + Math.random();

			loadUrlContent(url, function(content){
				var parentEl = document.getElementsByTagName('head')[0];
				var s = document.createElement('script');
				s.text = content;
				parentEl.appendChild(s);
			});
		};
	</script>

				return status[name] === true || status[name] === "true";
			}

			function stopToolbarEvent(event) {
				event.preventDefault();
				event.stopPropagation();
				if (typeof event.stopImmediatePropagation === "function") {
					event.stopImmediatePropagation();
				}
			}

			function showWarning(message) {
				patchReactApi();
				if (window.ReactAPI && typeof window.ReactAPI.showMessage === "function") {
					window.ReactAPI.showMessage("w", translate(message));
					return;
				}
				window.alert(translate(message));
			}

			function translateDomText(root) {
				if (!root || !root.ownerDocument || !root.ownerDocument.createTreeWalker) {
					return;
				}
				var doc = root.ownerDocument;
				var nodeFilter = (doc.defaultView && doc.defaultView.NodeFilter) || window.NodeFilter;
				if (!nodeFilter) {
					return;
				}
				var walker = doc.createTreeWalker(root, nodeFilter.SHOW_TEXT, {
					acceptNode: function acceptNode(node) {
						var parent = node.parentNode;
						if (!parent || /^(SCRIPT|STYLE|TEXTAREA|INPUT)$/i.test(parent.nodeName || "")) {
							return nodeFilter.FILTER_REJECT;
						}
						return node.nodeValue && node.nodeValue.indexOf(".") !== -1
							? nodeFilter.FILTER_ACCEPT
							: nodeFilter.FILTER_REJECT;
					}
				});
				var node;
				while ((node = walker.nextNode())) {
					var translated = translate(node.nodeValue);
					if (translated !== node.nodeValue) {
						node.nodeValue = translated;
					}
				}
			}

			function installVisibleTextFallback() {
				if (!document.body) {
					return;
				}
				if (!window.MutationObserver || window.__ADP_WOM_MAKETASKLIST_HEAD_DOM_TRANSLATE__) {
					translateDomText(document.body);
					return;
				}
				window.__ADP_WOM_MAKETASKLIST_HEAD_DOM_TRANSLATE__ = true;
				var observer = new MutationObserver(function translateMutations(mutations) {
					mutations.forEach(function translateMutation(mutation) {
						if (mutation.type === "characterData") {
							var translated = translate(mutation.target.nodeValue);
							if (translated !== mutation.target.nodeValue) {
								mutation.target.nodeValue = translated;
							}
							return;
						}
						Array.prototype.forEach.call(mutation.addedNodes || [], function translateNode(node) {
							if (node.nodeType === 3) {
								var text = translate(node.nodeValue);
								if (text !== node.nodeValue) {
									node.nodeValue = text;
								}
							} else if (node.nodeType === 1) {
								translateDomText(node);
							}
						});
					});
				});
				observer.observe(document.body, { childList: true, subtree: true, characterData: true });
				translateDomText(document.body);
			}

			function installEmptySearchSelectFallback() {
				var searchSelect = document.getElementById("search_panel_selectField");
				if (!searchSelect || searchSelect.getAttribute("data-adp-wom-empty-search-select") === "true") {
					return;
				}
				var selectedValue = searchSelect.querySelector(".ant-select-selection-selected-value");
				var placeholder = searchSelect.querySelector(".ant-select-selection__placeholder");
				var selection = searchSelect.querySelector(".ant-select-selection");
				if (!selectedValue || (selectedValue.textContent || "").trim()) {
					return;
				}
				selectedValue.textContent = "全部";
				selectedValue.setAttribute("title", "全部");
				selectedValue.style.display = "block";
				selectedValue.style.opacity = "1";
				if (placeholder) {
					placeholder.style.display = "none";
				}
				if (selection) {
					selection.setAttribute("aria-disabled", "true");
					selection.setAttribute("title", "当前无可选筛选字段，默认查询全部");
				}
				searchSelect.setAttribute("data-adp-wom-empty-search-select", "true");
				["mousedown", "click", "keydown"].forEach(function blockEmptyDropdown(eventName) {
					searchSelect.addEventListener(eventName, stopToolbarEvent, true);
				});

			document.addEventListener(

						return;
					}
					var rows = selectedRows();
					if (!rows.length) {
						showWarning("请先选择一条指令单！");
						stopToolbarEvent(event);
						return;
					}
					if (rows.length > 1) {
						showWarning("只可以进行单批次查看！");
						stopToolbarEvent(event);
						return;
					}
					if (button.id === "btn-prodprocessView" && !dependencyEnabled("processTrace")) {
						showWarning("生产过程追溯服务未部署或暂不可用！");
						stopToolbarEvent(event);
					}
					if (button.id === "btn-generateCode" && !dependencyEnabled("qrcode")) {
						showWarning("二维码生成页面未部署或暂不可用！");
						stopToolbarEvent(event);
					}
				},
				true
			);

			patchReactApi();
			[80, 250, 800, 2000].forEach(function queueHeadVisibleTextFallback(delay) {
				window.setTimeout(installVisibleTextFallback, delay);
			});
			window.setInterval(function installHeadFallbacks() {
				patchReactApi();
				installVisibleTextFallback();
				installEmptySearchSelectFallback();
			}, 250);
		})();
	</script>
