management.health.db.enabled=false
server.port=30195
server.servlet.context-path=/
spring.application.name=task-scheduler
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
mybatis-plus.type-aliases-package=com.supcon.supfusion.scheduler.server.dao.po
mybatis-plus.type-handlers-package=com.supcon.supfusion.supfusion.scheduler.server.typehandler
mybatis-plus.global-config.db-config.max-file-size=200MB
mybatis-plus.global-config.db-config.max-request-size=215MB
supfusion.cloud.i18n.locale-modules[0]=taskScheduler
supfusion.cloud.i18n.module-versions[0]=forceChange:taskScheduler202101081213
supfusion.cloud.i18n.basename=i18n/
supfusion.cloud.i18n.use-get-all-module=true
org.quartz.scheduler.instanceName=DefaultQuartzScheduler
org.quartz.scheduler.instanceId=AUTO
org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
#org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
org.quartz.jobStore.tablePrefix=QRTZ_
org.quartz.jobStore.isClustered=true
org.quartz.jobStore.clusterCheckinInterval=10000
org.quartz.jobStore.misfireThreshold=9000
org.quartz.jobStore.useProperties=false
org.quartz.jobStore.acquireTriggersWithinLock=true
org.quartz.jobStore.dataSource=quartzDataSource
org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
org.quartz.threadPool.threadCount=10
org.quartz.threadPool.threadPriority=5
org.quartz.threadPool.threadsInheritContextClassLoaderOfInitializingThread=true
#org.quartz.threadPool.job-store-type=jdbc
sys.domainName=/dddd
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss