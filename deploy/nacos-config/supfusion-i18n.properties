server.port=30130
server.servlet.context-path=/
server.tomcat.max-swallow-size=100MB
spring.messages.basename=forceChange:i18n/i18n/i18n
spring.application.name=i18n
spring.datasource.type=com.supcon.supfusion.framework.scaffold.dbp.MultiTenantDatasource
spring.datasource.initialization-mode=never
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
supfusion.swagger.enable=true
supfusion.i18n.xlsx-upload-max-size=15
supfusion.i18n.i18n-key-length-num-defa=255
supfusion.i18n.i18n-value-length-num-defa=500
supfusion.i18n.i18n-resource-path=forceChange:i18n/i18n/
supfusion.i18n.i18n-resource-code=i18n
supfusion.i18n.i18n-resource-version=i18n202101081213
supfusion.i18n.default-resource-path=forceChange:i18n/sys/
supfusion.i18n.default-resource-code=sys
supfusion.i18n.default-resource-version=forceChange:sys202101081213
supfusion.i18n.default-utc=UTC+8
supfusion.i18n.default-language=zh_CN
mybatis-plus.type-aliases-package=com.supcon.supfusion.i18n.dao.po
mybatis-plus.mapper-locations[0]=classpath:com/supcon/supfusion/i18n/dao/mapper/${supfusion.cloud.datasource.connect.system.db-type}/*.xml
mybatis-plus.global-config.db-config.id-type=ID_WORKER
mybatis-plus.global-config.db-config.field-strategy=NOT_EMPTY
mybatis-plus.global-config.db-config.db-type=${supfusion.cloud.datasource.connect.system.db-type}
mybatis-plus.global-config.db-config.optimistic-lock-enabled=false
mybatis-plus.global-config.db-config.logic-delete-enabled=true
mybatis-plus.configuration.map-underscore-to-camel-case=true
supfusion.cloud.i18n.basename=error/