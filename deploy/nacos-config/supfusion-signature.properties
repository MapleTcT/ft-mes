management.health.db.enabled=false
server.port=30105
server.servlet.context-path=/
spring.application.name=signature
spring.cloud.stream.kafka.binder.brokers=127.0.0.1:9092
spring.cloud.stream.kafka.binder.zk-nodes=127.0.0.1:2181
spring.cloud.stream.kafka.binder.auto-create-topics=true
spring.cloud.stream.kafka.bindings.signature_input_log.destination=topic.signature.log
spring.cloud.stream.kafka.bindings.signature_input_log.content-type=application/json
spring.cloud.stream.kafka.bindings.signature_input_log.group=${spring.application.name}
supfusion.cloud.i18n.locale-modules[0]=signature
supfusion.cloud.i18n.module-versions[0]=forceChange:signature202101081213
supfusion.cloud.i18n.modules[0]=signature
supfusion.cloud.i18n.use-get-all-module=true
supfusion.cloud.i18n.basename=forceChange:i18n/
feign.client.default-config=default
feign.client.default-to-properties=true
feign.clientconfig.default.connect-timeout=1000
feign.clientconfig.default.read-timeout=2000