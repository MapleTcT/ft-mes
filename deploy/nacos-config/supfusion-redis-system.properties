spring.redis.address=${SUPOS_REDIS_HOST:127.0.0.1}
spring.redis.port=${SUPOS_REDIS_PORT:6379}
#spring.redis.password=${REPLACE_ME}
spring.redis.database=0
spring.redis.host=${spring.redis.address}
spring.redis.master=${spring.redis.address}
spring.redis.minEvictableIdleTimeMillis=300000
spring.redis.numTestsPerEvictionRun=1024
spring.redis.pool.max-active=50
spring.redis.pool.max-idle=50
spring.redis.pool.max-wait=-1
spring.redis.pool.min-idle=0
spring.redis.testOnBorrow=true
spring.redis.testWhileIdle=true
spring.redis.timeBetweenEvictionRunsMillis=30000
spring.redis.timeout=30000
spring.cache.use-tenant-prefix=true
spring.cache.cacheTtl=P1DT0H0M0S
spring.cache.cache-null-values=false
