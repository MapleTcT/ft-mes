spring.application.name=notification-admin
cloud.stream.bindings.tenant-input.destination=supOS_tenant
cloud.stream.bindings.tenant-input.content-type=application/json
cloud.stream.bindings.tenant-input.group=${spring.application.name}
management.health.db.enabled=false
server.port=30102
server.servlet.context-path=/
supfusion.notification.thread.coreSize=5
supfusion.notification.thread.maxPoolSzie=5
supfusion.notification.thread.queueSize=200
supfusion.cloud.i18n.locale-modules[0]=notificationAdmin
supfusion.cloud.i18n.module-versions[0]=forceChange:notificationAdmin202104261213
supfusion.cloud.i18n.modules[0]=notificationAdmin
supfusion.cloud.i18n.modules[1]=notificationEmail
supfusion.cloud.i18n.modules[2]=notificationWechat
supfusion.cloud.i18n.modules[3]=notificationDingtalk
supfusion.cloud.i18n.basename=forceChange:i18n/
supfusion.cloud.tenant.sync-cache=false
supfusion.cloud.tenant.init-getter=false
supfusion.swagger.enable=true
mybatis-plus.mapper-locations[0]=forceChange:classpath:mappers/${supfusion.cloud.datasource.connect.system.db-type:oracle}/*.xml
